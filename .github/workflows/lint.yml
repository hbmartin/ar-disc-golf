name: Lint, typecheck, and test

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Use pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint
        run: pnpm run lint
      - name: Run svelte-check and tsc
        run: pnpm run check
      - name: Run tests
        run: pnpm run test
      - name: Build
        run: pnpm run build
