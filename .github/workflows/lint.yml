name: Lint, typecheck, and test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run lint
      run: npm run lint
    - name: Run svelte-check and tsc
      run: npm run check
    - name: Run tests
      run: npm run test
    - name: Build
      run: npm run build
